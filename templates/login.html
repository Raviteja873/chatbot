<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(120deg, #2b5876, #4e4376);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #login-box {
            width: 360px;
            padding: 30px;
            background: #ffffff10;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h2 {
            margin-bottom: 18px;
            color: #fff;
            font-size: 26px;
            letter-spacing: 1px;
        }

        #login-box input {
            width: 100%;
            margin: 10px 0;
            padding: 13px;
            font-size: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #ffffffcc;
            transition: 0.3s;
        }

        #login-box input:focus {
            box-shadow: 0 0 8px #ffffffcc;
        }

        #login-box button {
            width: 100%;
            padding: 13px;
            font-size: 16px;
            background: #00f7ff;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: #000;
            transition: 0.3s;
            margin-top: 10px;
        }

        #login-box button:hover {
            transform: scale(1.03);
            background: #fff;
        }

        #login-box a {
            display: block;
            margin-top: 15px;
            color: #ffffffdd;
            font-size: 14px;
            text-decoration: none;
            transition: 0.3s;
        }

        #login-box a:hover {
            color: #ffffff;
        }

        .error {
            color: #ff4b5c;
            background: #ffffffdd;
            padding: 8px;
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .success {
            color: #4caf50;
            background: #ffffffdd;
            padding: 8px;
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .password-container {
            position: relative;
            width: 100%;
            margin: 10px 0;
        }

        .password-container input {
            width: 100%;
            padding: 13px;
            padding-right: 45px;
            font-size: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #ffffffcc;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .password-container input:focus {
            box-shadow: 0 0 8px #ffffffcc;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 18px;
            color: #666;
            user-select: none;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: #333;
        }
    </style>
</head>
<body>
    <div id="login-box">
        <h2>Login</h2>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if success %}
            <p class="success">{{ success }}</p>
        {% endif %}

        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <div class="password-container">
                <input type="password" name="password" id="login-password" placeholder="Password" required>
                <span class="password-toggle" onclick="togglePassword('login-password', this)">👁️</span>
            </div>
            <button type="submit">Login</button>
        </form>
        <a href="/register">Don't have an account? Register</a>
        <a href="/forgot-password" style="margin-top: 10px; display: block;">Forgot Password?</a>
    </div>

    <script>
        function togglePassword(inputId, toggleElement) {
            const passwordInput = document.getElementById(inputId);
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Change the eye symbol
            toggleElement.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        }
    </script>
</body>
</html>
