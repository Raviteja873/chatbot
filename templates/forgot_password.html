<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(120deg, #667eea, #764ba2);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #forgot-box {
            width: 360px;
            padding: 30px;
            background: #ffffff10;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h2 {
            margin-bottom: 18px;
            color: #fff;
            font-size: 24px;
            letter-spacing: 1px;
        }

        p {
            color: #ffffffdd;
            margin-bottom: 20px;
            font-size: 14px;
        }

        #forgot-box input {
            width: 100%;
            margin: 10px 0;
            padding: 13px;
            font-size: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #ffffffcc;
            transition: 0.3s;
        }

        #forgot-box input:focus {
            box-shadow: 0 0 8px #ffffffcc;
        }

        #forgot-box button {
            width: 100%;
            padding: 13px;
            font-size: 16px;
            background: #ff6b6b;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease-in-out;
            margin-top: 10px;
        }

        #forgot-box button:hover {
            transform: scale(1.03);
            background: #ff5252;
        }

        #forgot-box a {
            display: block;
            margin-top: 15px;
            color: #ffffffdd;
            font-size: 14px;
            text-decoration: none;
            transition: 0.3s;
        }

        #forgot-box a:hover {
            color: #ffffff;
        }

        .error {
            color: #ff4b5c;
            background: #ffffffdd;
            padding: 8px;
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .success {
            color: #4caf50;
            background: #ffffffdd;
            padding: 8px;
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="forgot-box">
        <h2>Forgot Password</h2>
        <p>Enter your email address and we'll send you an OTP to reset your password.</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if success %}
            <p class="success">{{ success }}</p>
        {% endif %}

        <form action="/forgot-password" method="post">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Send OTP</button>
        </form>
        <a href="/login">Back to Login</a>
    </div>
</body>
</html>
