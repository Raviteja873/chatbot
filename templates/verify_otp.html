<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(120deg, #667eea, #764ba2);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #otp-box {
            width: 360px;
            padding: 30px;
            background: #ffffff10;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            text-align: center;
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h2 {
            margin-bottom: 18px;
            color: #fff;
            font-size: 24px;
            letter-spacing: 1px;
        }

        p {
            color: #ffffffdd;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .otp-input {
            width: 100%;
            margin: 10px 0;
            padding: 13px;
            font-size: 18px;
            text-align: center;
            letter-spacing: 8px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #ffffffcc;
            transition: 0.3s;
        }

        .otp-input:focus {
            box-shadow: 0 0 8px #ffffffcc;
        }

        #otp-box button {
            width: 100%;
            padding: 13px;
            font-size: 16px;
            background: #4caf50;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease-in-out;
            margin-top: 10px;
        }

        #otp-box button:hover {
            transform: scale(1.03);
            background: #45a049;
        }

        #otp-box a {
            display: block;
            margin-top: 15px;
            color: #ffffffdd;
            font-size: 14px;
            text-decoration: none;
            transition: 0.3s;
        }

        #otp-box a:hover {
            color: #ffffff;
        }

        .error {
            color: #ff4b5c;
            background: #ffffffdd;
            padding: 8px;
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .success {
            color: #4caf50;
            background: #ffffffdd;
            padding: 8px;
            font-size: 14px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .email-display {
            color: #fff;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="otp-box">
        <h2>Verify OTP</h2>
        <p>Enter the 6-digit OTP sent to your email</p>
        
        <div class="email-display">{{ email }}</div>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        {% if success %}
            <p class="success">{{ success }}</p>
        {% endif %}

        <form action="/verify-otp" method="post">
            <input type="text" name="otp" class="otp-input" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required>
            <button type="submit">Verify OTP</button>
        </form>
        <a href="/forgot-password">Resend OTP</a>
    </div>

    <script>
        // Auto-focus on OTP input
        document.addEventListener('DOMContentLoaded', function() {
            const otpInput = document.querySelector('.otp-input');
            otpInput.focus();
            
            // Only allow numbers
            otpInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/[^0-9]/g, '');
            });
        });
    </script>
</body>
</html>
